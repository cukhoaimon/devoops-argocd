# ArgoCD Applications cho 2 môi trường: non-prod và prod
# Apply: kubectl apply -f argocd/application.yaml
#
# Cấu trúc repo:
#   workload/
#   ├── Chart.yaml
#   ├── values.yaml          ← base defaults
#   ├── envs/
#   │   ├── non-prod/
#   │   │   └── values.yaml  ← non-prod overrides
#   │   └── prod/
#   │       └── values.yaml  ← prod overrides
#   └── templates/

# ──────────────────────────────────────────────
# NON-PROD environment
# ──────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: non-prod-workload
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
    environment: non-prod
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/cukhoaimon/devoops-argocd.git
    targetRevision: HEAD
    path: workload
    helm:
      valueFiles:
        - values.yaml
        - envs/non-prod/values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: non-prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

---
# ──────────────────────────────────────────────
# PROD environment
# ──────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prod-workload
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
    environment: prod
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/cukhoaimon/devoops-argocd.git
    targetRevision: HEAD
    path: workload
    helm:
      valueFiles:
        - values.yaml
        - envs/prod/values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
