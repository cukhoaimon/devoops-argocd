      targetRevision: HEAD
      path: workload
      helm:
        valueFiles:
          - values.yaml
          - $values/envs/prod/values.yaml

    # Source 2: Values files (ref: $values)
    - repoURL: https://github.com/cukhoaimon/devoops-argocd.git
      targetRevision: HEAD
