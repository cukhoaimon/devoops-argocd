# ArgoCD Applications cho 2 môi trường: non-prod và prod
# Apply: kubectl apply -f argocd/application.yaml

# ──────────────────────────────────────────────
# NON-PROD environment
# ──────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: non-prod-workload
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
    environment: non-prod
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
    # Source 1: Helm chart
    - repoURL: https://github.com/cukhoaimon/devoops-argocd.git
      targetRevision: HEAD
      path: workload
      helm:
        valueFiles:
          - values.yaml
          - $values/envs/non-prod/values.yaml

    # Source 2: Values files (ref: $values)
    - repoURL: https://github.com/cukhoaimon/devoops-argocd.git
      targetRevision: HEAD
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: non-prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

---
# ──────────────────────────────────────────────
# PROD environment
# ──────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
