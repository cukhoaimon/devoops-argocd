apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hbase
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/cukhoaimon/devoops-argocd
    targetRevision: main
    path: hbase
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: non-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true