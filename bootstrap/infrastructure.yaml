apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: infrastructure-postgresql
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - env: dev
            dir: non-prod
          - env: uat
            dir: non-prod
          - env: prod
            dir: prod
  template:
    metadata:
      name: '{{env}}-postgresql'
    spec:
      project: default
      source:
        repoURL: 'https://github.com/cukhoaimon/devoops-argocd.git'
        targetRevision: HEAD
        path: '{{dir}}/infrastructure/postgresql'
        helm:
          valueFiles:
            - 'values-{{env}}.yaml'
      destination:
        server: 'https://kubernetes.default.svc'
        namespace: '{{env}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
