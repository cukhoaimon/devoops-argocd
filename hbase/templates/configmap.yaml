apiVersion: v1
kind: ConfigMap
metadata:
  name: hbase-config
data:
  hbase-site.xml: |
    <configuration>
      <property>
        <name>hbase.rootdir</name>
        <value>file:///data/hbase</value>  
      </property>
      <property>
        <name>hbase.zookeeper.quorum</name>
        <value>{{ .Release.Name }}-zookeeper:2181</value>
      </property>
      <property>
        <name>hbase.cluster.distributed</name>
        <value>true</value>
      </property>
      <property>
        <name>hbase.unsafe.stream.capability.enforce</name>
        <value>false</value>
      </property>
    </configuration>