apiVersion: v1
kind: Service
metadata:
  name: hbase-master
spec:
  selector:
    app: hbase-master
  ports:
  - name: rpc
    port: 16000
  - name: web
    port: 16010
---
apiVersion: v1
kind: Service
metadata:
  name: hbase-regionserver
spec:
  clusterIP: None
  selector:
    app: hbase-regionserver
  ports:
  - name: rpc
    port: 16020
  - name: web
    port: 16030