zookeeper:
  image: zookeeper:3.9
  replicas: 1
  storage: 2Gi

hbase:
  image: harisekhon/hbase:2.1
  master:
    replicas: 1
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "1Gi"
        cpu: "500m"
  regionserver:
    replicas: 1
    resources:
      requests:
        memory: "1Gi"
        cpu: "500m"
      limits:
        memory: "2Gi"
        cpu: "1"
    storage: 5Gi
