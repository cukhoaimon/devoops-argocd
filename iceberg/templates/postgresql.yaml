apiVersion: apps/v1
kind: Deployment
metadata:
  name: iceberg-postgres
  namespace: data-warehouse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iceberg-postgres
  template:
    metadata:
      labels:
        app: iceberg-postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database }}
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: iceberg-postgres-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: iceberg-postgres-credentials
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.user | quote }}, "-d", {{ .Values.postgres.database | quote }}]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: iceberg-postgres-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: iceberg-postgres-data
  namespace: data-warehouse
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.postgres.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: iceberg-postgres
  namespace: data-warehouse
spec:
  selector:
    app: iceberg-postgres
  ports:
    - port: 5432
      targetPort: 5432
