apiVersion: apps/v1
kind: Deployment
metadata:
  name: jupyter
  namespace: spark
spec:
  replicas: 0
  selector:
    matchLabels:
      app: jupyter
  template:
    metadata:
      labels:
        app: jupyter
    spec:
      containers:
        - name: jupyter
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8888
          env:
            - name: SPARK_CONNECT_URL
              value: {{ .Values.sparkConnect.url }}
          command:
            - start-notebook.py
            - --NotebookApp.token=
            - --NotebookApp.password=
            - --ip=0.0.0.0
            - --port=8888
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          volumeMounts:
            - name: notebooks
              mountPath: /home/jovyan/work
      volumes:
        - name: notebooks
          emptyDir: {}
