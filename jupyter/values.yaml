image:
  repository: quay.io/jupyter/pyspark-notebook
  tag: latest
  pullPolicy: Always

service:
  port: 8888
  replicas: 1

ingress:
  host: jupyter.local
  ingressClassName: nginx

sparkConnect:
  url: sc://spark-connect-server.spark.svc.cluster.local:15002

persistence:
  size: 1Gi

gitSync:
  enabled: true
  image: alpine:3.20
  repo: cukhoaimon/devoops-argocd
  branch: main
  notebooksPath: apps/notebook
  syncIntervalSeconds: 30
  idleSeconds: 180
  secretName: jupyter-git-token
  secretTokenKey: token
  commitUserName: jupyter-bot
  commitUserEmail: jupyter-bot@phucdeptrai.com
  commitMessagePrefix: "chore(notebook): autosave"
