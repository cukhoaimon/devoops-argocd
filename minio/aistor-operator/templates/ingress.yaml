apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minio
  namespace: {{ .Release.Namespace }}
spec:
  ingressClassName: traefik
  rules:
    - host: minio.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.objectStore.name }}
                port:
                  number: 9001
