apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.objectStore.name }}-pvc
  namespace: {{ .Release.Namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ (index .Values.objectStore.pools 0).size }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.objectStore.name }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.objectStore.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.objectStore.name }}
    spec:
      containers:
        - name: minio
          image: quay.io/minio/minio:latest
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          envFrom:
            - secretRef:
                name: {{ .Values.objectStore.name }}-credentials
          ports:
            - containerPort: 9000
              name: s3
            - containerPort: 9001
              name: console
          resources:
            {{- toYaml .Values.objectStore.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.objectStore.name }}-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.objectStore.name }}
  namespace: {{ .Release.Namespace }}
spec:
  type: {{ .Values.objectStore.services.minio.serviceType }}
  selector:
    app: {{ .Values.objectStore.name }}
  ports:
    - name: s3
      port: 9000
      targetPort: 9000
      {{- if eq .Values.objectStore.services.minio.serviceType "NodePort" }}
      nodePort: {{ .Values.objectStore.services.minio.nodePort }}
      {{- end }}
    - name: console
      port: 9001
      targetPort: 9001
      {{- if eq .Values.objectStore.services.minio.serviceType "NodePort" }}
      nodePort: {{ .Values.objectStore.services.minio.consoleNodePort }}
      {{- end }}
