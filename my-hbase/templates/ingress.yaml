apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "hbase.fullname" . }}-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  rules:
    - host: my-hbase.local
      http:
        paths:
          - path: /hbase-master-ui(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ include "hbase.fullname" . }}-master
                port:
                  number: 16010
          - path: /region-server-ui(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ include "hbase.fullname" . }}-regionserver
                port:
                  number: 16030
