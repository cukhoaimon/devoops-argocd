apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: my-hbase-statefulset
spec:
  serviceName: my-hbase-service
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: my-hbase
  template:
    metadata:
      labels:
        app: my-hbase
    spec:
      containers:
        - name: hbase
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 2181  # ZooKeeper
            - containerPort: 60000 # HBase Master
            - containerPort: 60010 # HBase Master Web UI
            - containerPort: 60020 # RegionServer
            - containerPort: 60030 # RegionServer Web UI
            - containerPort: 8080  # REST API
          volumeMounts:
            - name: hbase-data
              mountPath: /hbase-data
            - name: hbase-config
              mountPath: /hbase/conf/hbase-site.xml
              subPath: hbase-site.xml
      volumes:
        - name: hbase-config
          configMap:
            name: my-hbase-config
  volumeClaimTemplates:
    - metadata:
        name: hbase-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.storage.size }}