apiVersion: networking.k8s.io/v1 
kind: Ingress
metadata:
  name: my-web-ingress
spec:
  rules:
    - host: my-web.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: my-web-service
                port:
                  number: 80