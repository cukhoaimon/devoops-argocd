apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-web-deployment
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: my-web
  template:
    metadata:
      labels:
        app: my-web
    spec:
      containers:
      - name: web-container
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }} 
        ports:
        - containerPort: 80