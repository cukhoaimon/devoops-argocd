apiVersion: v1
kind: ConfigMap
metadata:
  name: spark-defaults
  namespace: {{ .Release.Namespace }}
data:
  spark-defaults.conf: |

    # ─── Iceberg extensions ───────────────────────────────────────
    spark.sql.extensions=org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

    # ─── Iceberg REST Catalog ─────────────────────────────────────
    spark.sql.catalog.iceberg=org.apache.iceberg.spark.SparkCatalog
    spark.sql.catalog.iceberg.type=rest
    spark.sql.catalog.iceberg.uri={{ .Values.iceberg.catalogUri }}
    spark.sql.catalog.iceberg.warehouse={{ .Values.iceberg.warehouse }}

    # FileIO: dùng S3FileIO để đọc/ghi MinIO
    spark.sql.catalog.iceberg.io-impl=org.apache.iceberg.aws.s3.S3FileIO
    spark.sql.catalog.iceberg.s3.endpoint={{ .Values.minio.endpoint }}
    spark.sql.catalog.iceberg.s3.path-style-access=true
    spark.sql.catalog.iceberg.s3.access-key-id={{ .Values.minio.accessKeyId }}
    spark.sql.catalog.iceberg.s3.secret-access-key={{ .Values.minio.secretAccessKey }}
    spark.sql.catalog.iceberg.s3.region={{ .Values.aws.region }}

    # Default catalog khi không prefix
    spark.sql.defaultCatalog=iceberg

    # ─── Hadoop S3A (cho executor đọc file trực tiếp) ─────────────
    spark.hadoop.fs.s3a.endpoint={{ .Values.minio.endpoint }}
    spark.hadoop.fs.s3a.access.key={{ .Values.minio.accessKeyId }}
    spark.hadoop.fs.s3a.secret.key={{ .Values.minio.secretAccessKey }}
    spark.hadoop.fs.s3a.path.style.access=true
    spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
    spark.hadoop.fs.s3a.connection.ssl.enabled=false
    spark.hadoop.fs.s3a.aws.credentials.provider=org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider

    # ─── Spark on K8s ─────────────────────────────────────────────
    spark.master={{ .Values.spark.master }}
    spark.kubernetes.namespace={{ .Values.spark.namespace }}
    spark.kubernetes.authenticate.driver.serviceAccountName={{ .Values.spark.serviceAccountName }}
    spark.kubernetes.container.image={{ .Values.image.repository }}:{{ .Values.image.tag }}
    spark.kubernetes.container.image.pullPolicy={{ .Values.image.pullPolicy }}

    # Truyền credentials vào executor pods
    spark.kubernetes.driver.secretKeyRef.AWS_ACCESS_KEY_ID=minio-credentials:AWS_ACCESS_KEY_ID
    spark.kubernetes.driver.secretKeyRef.AWS_SECRET_ACCESS_KEY=minio-credentials:AWS_SECRET_ACCESS_KEY
    spark.kubernetes.driverEnv.AWS_REGION={{ .Values.aws.region }}
    spark.kubernetes.driverEnv.AWS_DEFAULT_REGION={{ .Values.aws.region }}
    spark.kubernetes.executor.secretKeyRef.AWS_ACCESS_KEY_ID=minio-credentials:AWS_ACCESS_KEY_ID
    spark.kubernetes.executor.secretKeyRef.AWS_SECRET_ACCESS_KEY=minio-credentials:AWS_SECRET_ACCESS_KEY
    spark.executorEnv.AWS_REGION={{ .Values.aws.region }}
    spark.executorEnv.AWS_DEFAULT_REGION={{ .Values.aws.region }}
    spark.driver.extraJavaOptions=-Daws.region={{ .Values.aws.region }}
    spark.executor.extraJavaOptions=-Daws.region={{ .Values.aws.region }}

    # ─── Executor resources ────────────────────────────────────────
    spark.executor.instances={{ .Values.spark.executor.instances }}
    spark.executor.memory={{ .Values.spark.executor.memory }}
    spark.executor.cores={{ .Values.spark.executor.cores }}
    spark.driver.memory={{ .Values.spark.driver.memory }}

    # ─── Spark Connect ────────────────────────────────────────────
    spark.connect.grpc.binding.port={{ .Values.connectPort }}
