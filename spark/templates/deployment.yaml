apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-connect-server
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: spark-connect-server
  template:
    metadata:
      labels:
        app: spark-connect-server
    spec:
      serviceAccountName: {{ .Values.spark.serviceAccountName }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: spark-connect
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          # Spark Connect Server start command
          command:
            - /bin/bash
            - -c
            - |
              /opt/spark/sbin/start-connect-server.sh \
                --properties-file /opt/spark/conf/spark-defaults.conf \
                --conf spark.connect.grpc.binding.port={{ .Values.connectPort }} \
                --conf spark.driver.host=${MY_POD_IP} \
                && tail -f /opt/spark/logs/*.out

          ports:
            - name: grpc
              containerPort: {{ .Values.connectPort }}
            - name: spark-ui
              containerPort: 4040
            - name: block-manager
              containerPort: 7078
            - name: jupyter
              containerPort: 8888

          envFrom:
            - secretRef:
                name: minio-credentials

          env:
            - name: AWS_REGION
              value: {{ .Values.aws.region }}
            - name: SPARK_NO_DAEMONIZE
              value: "true"
            - name: MY_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP

          volumeMounts:
            - name: spark-conf
              mountPath: /opt/spark/conf/spark-defaults.conf
              subPath: spark-defaults.conf
            - name: spark-logs
              mountPath: /opt/spark/logs
            - name: ivy-cache
              mountPath: /opt/spark/ivy-cache

          resources:
            requests:
              memory: {{ .Values.resources.requests.memory | quote }}
              cpu: {{ .Values.resources.requests.cpu | quote }}
            limits:
              memory: {{ .Values.resources.limits.memory | quote }}
              cpu: {{ .Values.resources.limits.cpu | quote }}

          readinessProbe:
            tcpSocket:
              port: {{ .Values.connectPort }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}

          livenessProbe:
            tcpSocket:
              port: {{ .Values.connectPort }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}

      volumes:
        - name: spark-conf
          configMap:
            name: spark-defaults
        - name: spark-logs
          emptyDir: {}
        - name: ivy-cache
          persistentVolumeClaim:
            claimName: spark-ivy-cache
