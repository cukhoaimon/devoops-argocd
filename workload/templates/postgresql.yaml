{{- if .Values.postgresql.enabled }}
---
# Secret cho PostgreSQL credentials
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "workload.fullname" . }}-postgresql
  labels:
    {{- include "workload.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgresql.auth.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgresql.auth.password | quote }}
  POSTGRES_DB: {{ .Values.postgresql.auth.database | quote }}

---
# PersistentVolumeClaim cho PostgreSQL data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "workload.fullname" . }}-postgresql-pvc
  labels:
    {{- include "workload.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.postgresql.storage.size }}
  {{- if .Values.postgresql.storage.storageClass }}
  storageClassName: {{ .Values.postgresql.storage.storageClass }}
  {{- end }}

---
# StatefulSet cho PostgreSQL
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "workload.fullname" . }}-postgresql
  labels:
    {{- include "workload.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  replicas: 1
  serviceName: {{ include "workload.fullname" . }}-postgresql-headless
  selector:
    matchLabels:
      {{- include "workload.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgresql
  template:
    metadata:
      labels:
        {{- include "workload.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgresql
    spec:
      containers:
        - name: postgresql
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgresql
              containerPort: 5432
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "workload.fullname" . }}-postgresql
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - exec pg_isready -U {{ .Values.postgresql.auth.username }} -d {{ .Values.postgresql.auth.database }} -h 127.0.0.1 -p 5432
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - exec pg_isready -U {{ .Values.postgresql.auth.username }} -d {{ .Values.postgresql.auth.database }} -h 127.0.0.1 -p 5432
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          {{- with .Values.postgresql.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: postgresql-data
          persistentVolumeClaim:
            claimName: {{ include "workload.fullname" . }}-postgresql-pvc

---
# Headless Service (dùng cho StatefulSet DNS)
apiVersion: v1
kind: Service
metadata:
  name: {{ include "workload.fullname" . }}-postgresql-headless
  labels:
    {{- include "workload.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: postgresql
      port: 5432
      targetPort: postgresql
  selector:
    {{- include "workload.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql

---
# ClusterIP Service (dùng cho app kết nối)
apiVersion: v1
kind: Service
metadata:
  name: {{ include "workload.fullname" . }}-postgresql
  labels:
    {{- include "workload.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  type: ClusterIP
  ports:
    - name: postgresql
      port: 5432
      targetPort: postgresql
  selector:
    {{- include "workload.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
{{- end }}
